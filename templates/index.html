<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>Welcome to My Flask Blog!</h1>

{% for post in posts %}
<div class="post">
    <div class="container_left">
        <h2>{{ post["title"] }}</h2>
        <p><em>Written by {{ post["author"] }}</em></p>
        <p>{{ post["content"] }}</p>
        <p>Likes: {{ post["like"] }}</p>
    </div>
    <div class="container_right">
        <form action="{{ url_for('delete', post_id=post['id']) }}" method='GET'>
            <input type="submit" value="Delete Post">
        </form>
        <form action="{{ url_for('update', post_id=post['id']) }}" method='GET'>
            <input type="submit" value="Update Post">
        </form>
        <form action="{{ url_for('like', post_id=post['id']) }}" method='GET'>
            <input type="submit" value="Like Post">
        </form>
    </div>
</div>
{% endfor %}
Click <a href="{{ url_for('add') }}">here</a> to Add a Post
</body>
</html>
